<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Kelas Pertemuan 2</title>
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 40px;
        min-height: 100vh;
        margin: 0;
        font-family: 'Times New Roman', Times, serif;
    }
    h1 {
        margin-bottom: 5px;
    }
    h3 {
        margin-top: 20px;
        margin-bottom: 10px;
    }
    table {
        min-width: 600px;
        font-size: 15px;
        margin-bottom: 20px;
    }
    table, th, td {
        border: 1px solid black;
        border-collapse: collapse;
        padding: 8px;
        text-align: center;
    }
    form {
        width: 100%;
        max-width: 600px;
    }
    fieldset {
        font-size: 15px;
        padding: 15px;
    }
</style>
</head>
<body>

    <h1>Latihan Kelas Pertemuan 2</h1>
    
    <h3>1. Membuat Tabel</h3>
    <table>
        <tr style="background-color: rgb(20, 63, 163); color: white;">
            <th rowspan="2">Nama</th>
            <th colspan="3">Nilai</th>
        </tr>
        <tr style="background-color: rgb(20, 63, 163); color: white;">
            <th>Kimia</th>
            <th>Fisika</th>
            <th>Biologi</th>
        </tr>
        <tr>
            <td>Robby</td>
            <td>76</td>
            <td>80</td>
            <td>81</td>
        </tr>
        <tr>
            <td>Rendi</td>
            <td>84</td>
            <td>70</td>
            <td>75</td>
        </tr>
        <tr>
            <td>Alfian</td>
            <td>96</td>
            <td>70</td>
            <td>71</td>
        </tr>
    </table>

    <h3>2. Membuat Login Page</h3>
    <form onsubmit="alert('anda telah login'); return false;">
        <fieldset>
            <legend>Login</legend><br>
            <label for="fname">Username:</label>
            <input type="text" id="fname" name="fname" minlength="5"><br><br>
            
            <label for="lname">Password:</label>
            <input type="password" id="lname" name="lname" minlength="8" required><br><br>
            
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Remember me</label><br><br>
            
            <input type="submit" value="Submit">
        </fieldset>
    </form>

</body>
</html>
